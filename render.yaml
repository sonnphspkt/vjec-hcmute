services:
  - type: web
    name: vjec-hcmute-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        value: https://jobs.vjec.edu.vn
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
