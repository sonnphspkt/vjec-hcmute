<!doctype html>
<html lang="vi" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UTE Job Platform - Digital Career Ecosystem</title>
    <meta name="description" content="Hệ sinh thái nghề nghiệp số cho sinh viên Đại học Sư phạm Kỹ thuật TP.HCM" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script>
      try {
        var raw = localStorage.getItem('theme-storage');
        if (raw) {
          var parsed = JSON.parse(raw);
          var mode = parsed && parsed.state && parsed.state.mode;
          if (mode === 'light') document.documentElement.classList.remove('dark');
          else document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
